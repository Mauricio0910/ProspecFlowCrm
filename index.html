<script>
// ========== CONFIGURAÇÃO ==========
const firebaseConfig = {
  apiKey: "AIzaSyC8GsM4lOCEq54cvbyYCZc0lcmqCQH96F4",
  authDomain: "marketmap-8fa2c.firebaseapp.com",
  projectId: "marketmap-8fa2c",
  storageBucket: "marketmap-8fa2c.appspot.com",
  messagingSenderId: "527088854237",
  appId: "1:527088854237:web:abc123def456"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ========== VARIÁVEIS ==========
let map, geocoder, markers = [], companiesList = [], currentPlace = null;
let currentUser = null, currentUserRole = 'consultor';
let placesService = null;
let currentEditId = null;

const brazilStates = {
  'SP':'São Paulo','RJ':'Rio de Janeiro','MG':'Minas Gerais','RS':'Rio Grande do Sul','PR':'Paraná','SC':'Santa Catarina',
  'BA':'Bahia','PE':'Pernambuco','CE':'Ceará','DF':'Distrito Federal','GO':'Goiás','ES':'Espírito Santo','PA':'Pará','AM':'Amazonas'
};

function showNotif(msg, type) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = `notif show ${type}`;
  setTimeout(() => n.classList.remove('show'), 3000);
}

// Extrair localização detalhada
function extractLocationDetails(address) {
  if (!address) return { state: '', city: '', neighborhood: '', street: '', fullAddress: address };
  
  let state = '', city = '', neighborhood = '', street = '';
  
  // Extrair estado (UF)
  const stateMatch = address.match(/([A-Z]{2})(?=\s|$|,)/);
  if (stateMatch) state = stateMatch[1];
  
  // Extrair cidade
  const cityMatch = address.match(/([A-Za-zÀ-ÖØ-öø-ÿ\s]+?)\s*-\s*[A-Z]{2}/);
  if (cityMatch) city = cityMatch[1].trim();
  else {
    const parts = address.split(',');
    if (parts.length >= 2) {
      let possibleCity = parts[0].trim();
      possibleCity = possibleCity.replace(/^\d+/, '').replace(/Rua|Av|Avenida|Travessa|Alameda|Rodovia/i, '').trim();
      if (possibleCity.length > 2 && possibleCity.length < 40) city = possibleCity;
    }
  }
  
  // Extrair rua (primeira parte do endereço)
  const firstPart = address.split(',')[0].trim();
  street = firstPart.replace(/^\d+/, '').trim();
  
  return { state, city, neighborhood, street, fullAddress: address };
}

// ========== LOGIN ==========
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errDiv = document.getElementById('login-err');
  
  if (!email || !pass) {
    errDiv.innerHTML = 'Preencha e-mail e senha';
    errDiv.style.display = 'block';
    return;
  }
  
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    const userDoc = await db.collection('users').doc(auth.currentUser.uid).get();
    currentUserRole = userDoc.exists ? userDoc.data().role || 'consultor' : 'consultor';
    document.getElementById('role-badge').textContent = currentUserRole.toUpperCase();
    
    if (currentUserRole === 'diretor') {
      document.getElementById('admin-tab-btn').style.display = 'block';
      loadAdminPanel();
    }
    
    await loadCompanies();
    loadGoogleMaps();
  } catch (error) {
    errDiv.innerHTML = 'Erro: ' + error.message;
    errDiv.style.display = 'block';
  }
}

async function loadCompanies() {
  const snapshot = await db.collection('companies').get();
  companiesList = [];
  snapshot.forEach(doc => companiesList.push({ id: doc.id, ...doc.data() }));
  console.log('Empresas carregadas:', companiesList.length);
}

async function saveCompanyToFirestore(data) {
  if (currentEditId) {
    await db.collection('companies').doc(currentEditId).update(data);
    showNotif('✅ Atualizado!', 'success');
  } else {
    const newId = Date.now().toString();
    data.id = newId;
    await db.collection('companies').doc(newId).set(data);
    showNotif('✅ Salvo!', 'success');
  }
  await loadCompanies();
  loadMarkers();
  updateMarketShare();
  closeModal();
}

function loadGoogleMaps() {
  let key = localStorage.getItem('mm_gkey');
  if (!key) {
    key = prompt('🔑 Chave da Google Maps API:');
    if (key && key.startsWith('AIza')) localStorage.setItem('mm_gkey', key);
    else return;
  }
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places,geometry&callback=initMap`;
  document.head.appendChild(script);
}

function initMap() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  map = new google.maps.Map(document.getElementById('google-map'), { zoom: 12, center: { lat: -23.5505, lng: -46.6333 } });
  geocoder = new google.maps.Geocoder();
  placesService = new google.maps.places.PlacesService(map);
  loadMarkers();
  updateMarketShare();
  setupEventListeners();
  showNotif('✅ Mapa carregado!', 'success');
}

function loadMarkers() {
  if (!map) return;
  markers.forEach(m => m.setMap(null));
  markers = [];
  companiesList.forEach(c => {
    if (c.lat && c.lng) {
      let color = '#6b7280';
      if (c.isCustomer) color = '#22c55e';
      else if (c.isExClient) color = '#f59e0b';
      else if (c.isCompetitor) color = '#ef4444';
      else if (c.isVisited) color = '#a855f7';
      
      const m = new google.maps.Marker({
        position: { lat: c.lat, lng: c.lng },
        map, title: c.name,
        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeWeight: 0, scale: 8 }
      });
      m.addListener('click', () => openCompanyModal(c));
      markers.push(m);
    }
  });
}

async function searchBusinesses() {
  const searchType = document.querySelector('input[name="searchType"]:checked').value;
  let query = searchType === 'location' ? document.getElementById('search-input').value.trim() : document.getElementById('company-name-input').value.trim();
  if (!query) { showNotif('Digite algo', 'error'); return; }
  
  markers.forEach(m => m.setMap(null));
  markers = [];
  
  if (searchType === 'company') {
    placesService.textSearch({ query, fields: ['name', 'formatted_address', 'geometry', 'place_id'] }, (res, status) => {
      if (status === 'OK' && res.length) {
        displayResults(res);
        if (res[0].geometry) map.setCenter(res[0].geometry.location);
        map.setZoom(16);
      } else showNotif('Nenhuma empresa encontrada', 'error');
    });
  } else {
    geocoder.geocode({ address: query + ', Brasil' }, (res, status) => {
      if (status === 'OK' && res[0]) {
        map.setCenter(res[0].geometry.location);
        map.setZoom(14);
        placesService.nearbySearch({ location: res[0].geometry.location, radius: 2000, type: 'establishment' }, (res2, status2) => {
          if (status2 === 'OK' && res2.length) displayResults(res2);
          else showNotif('Nenhuma empresa encontrada', 'error');
        });
      } else showNotif('Local não encontrado', 'error');
    });
  }
}

function displayResults(results) {
  const listDiv = document.getElementById('company-list');
  listDiv.innerHTML = '';
  results.forEach(place => {
    const existing = companiesList.find(c => c.placeId === place.place_id);
    let statusTag = existing ? (existing.isCustomer ? 'Cliente' : (existing.isCompetitor ? 'Concorrente' : (existing.isExClient ? 'Ex-Cliente' : 'Visitado'))) : 'Não cadastrada';
    const card = document.createElement('div');
    card.className = `company-card ${existing?.isCustomer ? 'client' : (existing?.isCompetitor ? 'competitor' : (existing?.isExClient ? 'exclient' : ''))}`;
    card.innerHTML = `<div class="company-name">${place.name}</div><div class="company-addr">${place.formatted_address || place.vicinity}</div><div class="company-tags"><span class="tag">${statusTag}</span>${existing?.system ? `<span class="tag tag-system">${existing.system}</span>` : ''}</div>`;
    card.onclick = () => openModalFromPlace(place);
    listDiv.appendChild(card);
    if (place.geometry) {
      let color = existing ? (existing.isCustomer ? '#22c55e' : (existing.isCompetitor ? '#ef4444' : (existing.isExClient ? '#f59e0b' : '#a855f7'))) : '#6b7280';
      const m = new google.maps.Marker({ position: place.geometry.location, map, title: place.name, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeWeight: 0, scale: 8 } });
      m.addListener('click', () => openModalFromPlace(place));
      markers.push(m);
    }
  });
}

// ========== MARKET SHARE COM FILTROS ==========
function updateMarketShare() {
  const container = document.getElementById('market-container');
  if (!container) return;
  
  // Coletar opções únicas para filtros
  const states = new Set();
  const cities = new Set();
  const neighborhoods = new Set();
  const streets = new Set();
  
  companiesList.forEach(c => {
    const details = extractLocationDetails(c.address);
    if (details.state) states.add(details.state);
    if (details.city) cities.add(details.city);
    if (details.neighborhood) neighborhoods.add(details.neighborhood);
    if (details.street) streets.add(details.street);
  });
  
  const html = `
    <div class="filter-bar">
      <div class="filter-group"><label>📍 Estado</label><select id="filter-state" class="filter-select" onchange="updateMarketFilter()"><option value="">Todos</option>${Array.from(states).sort().map(s => `<option value="${s}">${brazilStates[s] || s}</option>`).join('')}</select></div>
      <div class="filter-group"><label>🏙️ Cidade</label><select id="filter-city" class="filter-select" onchange="updateMarketFilter()"><option value="">Todas</option>${Array.from(cities).sort().map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
      <div class="filter-group"><label>🏘️ Bairro</label><input type="text" id="filter-neighborhood" class="filter-input" placeholder="Digite o bairro" onkeyup="updateMarketFilter()"></div>
      <div class="filter-group"><label>🛣️ Rua</label><input type="text" id="filter-street" class="filter-input" placeholder="Digite a rua" onkeyup="updateMarketFilter()"></div>
      <div class="filter-group"><label>📊 Tipo</label><select id="filter-type" class="filter-select" onchange="updateMarketFilter()"><option value="all">Todos</option><option value="customers">Apenas Clientes</option><option value="competitors">Apenas Concorrentes</option></select></div>
      <button class="btn-sm" onclick="resetMarketFilters()" style="background:#f59e0b;color:#fff">Limpar Filtros</button>
    </div>
    <div id="market-results"></div>
  `;
  container.innerHTML = html;
  
  window.updateMarketFilter = function() {
    generateMarketReport();
  };
  
  window.resetMarketFilters = function() {
    document.getElementById('filter-state').value = '';
    document.getElementById('filter-city').value = '';
    document.getElementById('filter-neighborhood').value = '';
    document.getElementById('filter-street').value = '';
    document.getElementById('filter-type').value = 'all';
    generateMarketReport();
  };
  
  generateMarketReport();
}

function generateMarketReport() {
  const resultsDiv = document.getElementById('market-results');
  if (!resultsDiv) return;
  
  const stateFilter = document.getElementById('filter-state')?.value || '';
  const cityFilter = document.getElementById('filter-city')?.value || '';
  const neighborhoodFilter = document.getElementById('filter-neighborhood')?.value.toLowerCase() || '';
  const streetFilter = document.getElementById('filter-street')?.value.toLowerCase() || '';
  const typeFilter = document.getElementById('filter-type')?.value || 'all';
  
  // Filtrar empresas
  let filtered = companiesList.filter(c => {
    const details = extractLocationDetails(c.address);
    if (stateFilter && details.state !== stateFilter) return false;
    if (cityFilter && details.city !== cityFilter) return false;
    if (neighborhoodFilter && !details.neighborhood.toLowerCase().includes(neighborhoodFilter)) return false;
    if (streetFilter && !details.street.toLowerCase().includes(streetFilter)) return false;
    if (typeFilter === 'customers' && !c.isCustomer) return false;
    if (typeFilter === 'competitors' && !c.isCompetitor) return false;
    return true;
  });
  
  // Somente clientes e concorrentes para o cálculo (excluir Ex-Clientes do market share)
  const clients = filtered.filter(c => c.isCustomer === true);
  const competitors = filtered.filter(c => c.isCompetitor === true);
  const total = clients.length + competitors.length;
  const ourShare = total > 0 ? ((clients.length / total) * 100).toFixed(1) : 0;
  const theirShare = total > 0 ? ((competitors.length / total) * 100).toFixed(1) : 0;
  
  // Agrupar por localização para análise detalhada
  const locationGroups = {};
  
  filtered.forEach(c => {
    const details = extractLocationDetails(c.address);
    let locationKey = '';
    if (stateFilter && !cityFilter) locationKey = details.state;
    else if (cityFilter) locationKey = details.city;
    else locationKey = details.state;
    
    if (!locationKey) locationKey = 'Geral';
    
    if (!locationGroups[locationKey]) {
      locationGroups[locationKey] = { clients: 0, competitors: 0, total: 0, name: locationKey };
    }
    if (c.isCustomer) locationGroups[locationKey].clients++;
    if (c.isCompetitor) locationGroups[locationKey].competitors++;
    locationGroups[locationKey].total = locationGroups[locationKey].clients + locationGroups[locationKey].competitors;
  });
  
  let html = `
    <!-- Cards Resumo -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${clients.length}</div><div>✅ Nossos Clientes</div></div>
      <div class="stat-card"><div class="stat-number">${competitors.length}</div><div>⚠️ Concorrentes</div></div>
      <div class="stat-card"><div class="stat-number">${total}</div><div>🏢 Total de Empresas</div></div>
    </div>
    
    <!-- Comparativo Geral -->
    <div class="report-card">
      <div class="report-title">📊 COMPARATIVO GERAL - Nós vs Concorrentes</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number">${ourShare}%</div>
          <div>✅ Nossa Participação</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${ourShare}%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${theirShare}%</div>
          <div>⚠️ Participação dos Concorrentes</div>
          <div class="progress-bar"><div class="progress-fill competitor" style="width:${theirShare}%"></div></div>
        </div>
      </div>
      <div class="comparison-bar">
        <div class="bar-our" style="width:${ourShare}%">${ourShare}%</div>
        <div class="bar-them" style="width:${theirShare}%">${theirShare}%</div>
      </div>
    </div>
  `;
  
  // Análise por localização
  if (Object.keys(locationGroups).length > 0) {
    html += `<div class="report-card"><div class="report-title">📍 ANÁLISE POR LOCALIZAÇÃO</div>`;
    
    const sorted = Object.entries(locationGroups).sort((a,b) => b[1].total - a[1].total);
    for (const [key, data] of sorted) {
      const share = data.total > 0 ? ((data.clients / data.total) * 100).toFixed(1) : 0;
      const isWinning = share > 50;
      html += `
        <div class="location-row" onclick="applyLocationFilter('${key}')">
          <div style="display:flex; justify-content:space-between; align-items:center">
            <div><strong>${data.name}</strong></div>
            <div><span class="${isWinning ? 'win-badge' : 'lose-badge'}">${isWinning ? '🏆 Lideramos' : '⚠️ Perdemos'}</span></div>
          </div>
          <div style="margin-top:8px">
            <div style="display:flex; justify-content:space-between; font-size:12px">
              <span>✅ Clientes: ${data.clients}</span>
              <span>⚠️ Concorrentes: ${data.competitors}</span>
              <span>📊 Share: ${share}%</span>
            </div>
            <div class="comparison-bar" style="height:20px">
              <div class="bar-our" style="width:${share}%; font-size:9px">${share}%</div>
              <div class="bar-them" style="width:${100-share}%; font-size:9px">${(100-share).toFixed(1)}%</div>
            </div>
          </div>
        </div>
      `;
    }
    html += `</div>`;
  }
  
  // Lista de Concorrentes na região filtrada
  if (competitors.length > 0) {
    html += `<div class="report-card"><div class="report-title">⚠️ CONCORRENTES IDENTIFICADOS</div>`;
    competitors.forEach(c => {
      html += `<div class="company-row" style="cursor:pointer" onclick='openCompanyModal(${JSON.stringify(c).replace(/'/g, "\\'")})'>
        <span>🏆 ${c.name}</span>
        <span class="badge badge-competitor">${c.competitorName || 'Concorrente'}</span>
      </div>`;
    });
    html += `</div>`;
  }
  
  resultsDiv.innerHTML = html;
}

window.applyLocationFilter = function(location) {
  const stateSelect = document.getElementById('filter-state');
  const citySelect = document.getElementById('filter-city');
  const typeSelect = document.getElementById('filter-type');
  
  // Verificar se é um estado
  if (brazilStates[location]) {
    stateSelect.value = location;
    citySelect.value = '';
  } else {
    // Tentar encontrar se é uma cidade
    stateSelect.value = '';
    citySelect.value = location;
  }
  typeSelect.value = 'all';
  updateMarketFilter();
};

// ========== RELATÓRIOS ==========
function updateReports() {
  const container = document.getElementById('reports-container');
  if (!container) return;
  container.innerHTML = '<div class="report-card">Relatórios em desenvolvimento...</div>';
}

function updateCompetitorsList() {
  const container = document.getElementById('competitors-container');
  if (!container) return;
  
  const competitors = companiesList.filter(c => c.isCompetitor === true);
  const stateStats = {};
  
  competitors.forEach(c => {
    const { state } = extractLocationDetails(c.address);
    if (state) {
      if (!stateStats[state]) stateStats[state] = [];
      stateStats[state].push(c);
    }
  });
  
  let html = `<div class="stats-grid"><div class="stat-card"><div class="stat-number">${competitors.length}</div><div>Total Concorrentes</div></div></div>`;
  
  for (const [state, list] of Object.entries(stateStats).sort((a,b) => b[1].length - a[1].length)) {
    html += `<div class="report-card"><div class="report-title">⚠️ ${brazilStates[state] || state} (${list.length})</div>`;
    list.forEach(c => {
      html += `<div class="company-row" style="cursor:pointer" onclick='openCompanyModal(${JSON.stringify(c).replace(/'/g, "\\'")})'>
        <span>🏆 ${c.name}</span>
        <span class="badge badge-competitor">${c.competitorName || 'Concorrente'}</span>
      </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

// ========== MODAL ==========
function openModalFromPlace(place) {
  currentPlace = place;
  const existing = companiesList.find(c => c.placeId === place.place_id);
  document.getElementById('modal-name').value = place.name || '';
  document.getElementById('modal-address').value = place.formatted_address || place.vicinity || '';
  document.getElementById('modal-system').value = existing?.system || '';
  document.getElementById('modal-counter').value = existing?.counter || '';
  document.getElementById('check-customer').checked = existing?.isCustomer || false;
  document.getElementById('check-exclient').checked = existing?.isExClient || false;
  document.getElementById('check-competitor').checked = existing?.isCompetitor || false;
  document.getElementById('check-visited').checked = existing?.isVisited || false;
  document.getElementById('modal-competitor-name').value = existing?.competitorName || '';
  document.getElementById('competitor-field').style.display = existing?.isCompetitor ? 'block' : 'none';
  currentEditId = existing?.id || null;
  document.getElementById('modal-overlay').classList.add('open');
}

function openCompanyModal(company) {
  currentPlace = null;
  document.getElementById('modal-name').value = company.name || '';
  document.getElementById('modal-address').value = company.address || '';
  document.getElementById('modal-system').value = company.system || '';
  document.getElementById('modal-counter').value = company.counter || '';
  document.getElementById('check-customer').checked = company.isCustomer || false;
  document.getElementById('check-exclient').checked = company.isExClient || false;
  document.getElementById('check-competitor').checked = company.isCompetitor || false;
  document.getElementById('check-visited').checked = company.isVisited || false;
  document.getElementById('modal-competitor-name').value = company.competitorName || '';
  document.getElementById('competitor-field').style.display = company.isCompetitor ? 'block' : 'none';
  currentEditId = company.id;
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('check-competitor').addEventListener('change', function() {
  document.getElementById('competitor-field').style.display = this.checked ? 'block' : 'none';
});
document.getElementById('check-customer').addEventListener('change', function() {
  if (this.checked) { document.getElementById('check-exclient').checked = false; document.getElementById('check-competitor').checked = false; }
});
document.getElementById('check-exclient').addEventListener('change', function() {
  if (this.checked) { document.getElementById('check-customer').checked = false; document.getElementById('check-competitor').checked = false; }
});

async function saveCompany() {
  const system = document.getElementById('modal-system').value.trim();
  const counter = document.getElementById('modal-counter').value.trim();
  if (!system || !counter) { showNotif('Preencha sistema e contador', 'error'); return; }
  
  const isCustomer = document.getElementById('check-customer').checked;
  const isExClient = document.getElementById('check-exclient').checked;
  const isCompetitor = document.getElementById('check-competitor').checked;
  const isVisited = document.getElementById('check-visited').checked;
  
  if (!isCustomer && !isExClient && !isCompetitor) { showNotif('Selecione a classificação', 'error'); return; }
  
  let competitorName = null;
  if (isCompetitor) {
    competitorName = document.getElementById('modal-competitor-name').value.trim();
    if (!competitorName) { showNotif('Informe o nome do concorrente', 'error'); return; }
  }
  
  let data = { system, counter, isCustomer, isExClient, isCompetitor, isVisited, competitorName, updatedAt: new Date().toISOString() };
  if (currentPlace) {
    data = { ...data, placeId: currentPlace.place_id, name: document.getElementById('modal-name').value, address: document.getElementById('modal-address').value, lat: currentPlace.geometry.location.lat(), lng: currentPlace.geometry.location.lng(), createdAt: new Date().toISOString() };
  }
  await saveCompanyToFirestore(data);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); currentPlace = null; currentEditId = null; }

// ========== ADMIN ==========
async function loadAdminPanel() {
  const panel = document.getElementById('admin-panel');
  if (!panel) return;
  const usersSnapshot = await db.collection('users').get();
  let html = '<div class="report-card"><strong>👥 Usuários</strong><table class="table"><thead><tr><th>Email</th><th>Função</th><th>Ações</th></tr></thead><tbody>';
  usersSnapshot.forEach(doc => {
    const user = doc.data();
    html += `<tr><td>${user.email}</td><td><select id="role-${doc.id}" class="filter-select"><option ${user.role==='diretor'?'selected':''}>diretor</option><option ${user.role==='gerente'?'selected':''}>gerente</option><option ${user.role==='consultor'?'selected':''}>consultor</option></select></td><td><button class="btn-sm" onclick="updateUserRole('${doc.id}')">Salvar</button></td></tr>`;
  });
  html += '</tbody></table></div><div class="report-card"><strong>➕ Novo Usuário</strong><div class="search-row"><input type="email" id="new-user-email" placeholder="Email" class="filter-input"><input type="password" id="new-user-pass" placeholder="Senha" class="filter-input"><select id="new-user-role" class="filter-select"><option>consultor</option><option>gerente</option><option>diretor</option></select><button class="btn-sm" onclick="createNewUser()" style="background:#3b82f6;color:#fff">Criar</button></div></div>';
  panel.innerHTML = html;
}

window.updateUserRole = async function(userId) {
  const newRole = document.getElementById(`role-${userId}`).value;
  await db.collection('users').doc(userId).update({ role: newRole });
  showNotif('Função atualizada!', 'success');
};

window.createNewUser = async function() {
  const email = document.getElementById('new-user-email').value;
  const pass = document.getElementById('new-user-pass').value;
  const role = document.getElementById('new-user-role').value;
  if (!email || !pass) { showNotif('Preencha email e senha', 'error'); return; }
  try {
    const userCred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(userCred.user.uid).set({ email, role });
    showNotif('Usuário criado!', 'success');
    loadAdminPanel();
  } catch (error) { showNotif('Erro: ' + error.message, 'error'); }
};

// ========== UTILITÁRIOS ==========
function filterByStatus(status, btn) {
  document.querySelectorAll('.map-controls .btn-sm').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cards = document.querySelectorAll('.company-card');
  cards.forEach(card => {
    const text = card.innerText;
    if (status === 'all') card.style.display = 'block';
    else if (status === 'customer' && text.includes('Cliente')) card.style.display = 'block';
    else if (status === 'exclient' && text.includes('Ex-Cliente')) card.style.display = 'block';
    else if (status === 'competitor' && text.includes('Concorrente')) card.style.display = 'block';
    else if (status === 'visited' && text.includes('Visitado')) card.style.display = 'block';
    else card.style.display = 'none';
  });
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tab + '-tab').classList.add('active');
  if (tab === 'market') updateMarketShare();
  if (tab === 'reports') updateReports();
  if (tab === 'competitors') updateCompetitorsList();
  if (tab === 'admin' && currentUserRole === 'diretor') loadAdminPanel();
}

function doLogout() { auth.signOut(); location.reload(); }
function setupEventListeners() {
  const rloc = document.querySelector('input[value="location"]');
  const rcomp = document.querySelector('input[value="company"]');
  const sinp = document.getElementById('search-input');
  const cinp = document.getElementById('company-name-input');
  if (rloc && rcomp) {
    rloc.onchange = () => { sinp.style.display = 'block'; cinp.style.display = 'none'; };
    rcomp.onchange = () => { sinp.style.display = 'none'; cinp.style.display = 'block'; };
  }
  document.getElementById('search-input')?.addEventListener('keypress', e => { if (e.key === 'Enter') searchBusinesses(); });
}

auth.onAuthStateChanged(user => { if (user) loadCompanies().then(() => loadGoogleMaps()); });
